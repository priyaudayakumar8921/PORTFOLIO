    <!-- Right-side Social Pull-out Menu -->

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const socialMenuContainer = document.getElementById('social-menu-container');
            const socialMenuToggle = document.getElementById('social-menu-toggle');
            const socialMenuClose = document.getElementById('social-menu-close');

            if (socialMenuToggle && socialMenuClose) {
                socialMenuToggle.addEventListener('click', () => {
                    socialMenuContainer.classList.remove('translate-x-full');
                    socialMenuToggle.classList.add('opacity-0', 'pointer-events-none');
                });

                socialMenuClose.addEventListener('click', () => {
                    socialMenuContainer.classList.add('translate-x-full');
                    socialMenuToggle.classList.remove('opacity-0', 'pointer-events-none');
                });
            }
        });
    </script>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = atob('aHR0cHM6Ly9peXFtcXpoanhxbXN3dWZsbXNlei5zdXBhYmFzZS5jbw==');
        const SUPABASE_ANON_KEY = atob('ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW1sNWNXMXhlbWhxZUhGdGMzZDFabXh0YzJWNklpd2ljbTlzWlNJNkltRnViMjRpTENKcFlYUWlPakUzT0RJek9UWXpPRElzSW1WNGNDSTZNakE1TnprM01qTTRNbjAuMi1YeDN3SDBacXBJTkJnZ2wyTGNOSXJrVWxCNElZM1ZUeHhrNzFocUJsUQ==');

        let supabaseClient = null;
        try {
            if (window.supabase && typeof window.supabase.createClient === 'function') {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch (error) {
            console.warn('Supabase initialization failed:', error);
        }

        let certificationsData = [];

        async function loadAndRenderCertifications() {
            function render(data) {
                const timeline = document.getElementById('certifications-timeline');
                timeline.innerHTML = data.map((cert) => `
                    <div class="relative pl-8 md:pl-12 animate-on-scroll group">
                        <!-- Timeline Dot -->
                        <div class="absolute w-5 h-5 bg-base border-4 border-accent rounded-full -left-[11px] top-1.5 shadow-[0_0_10px_rgba(240,237,229,0.5)] group-hover:scale-125 transition-transform duration-300"></div>
                        
                        <!-- Content Card -->
                        <div class="bg-cardBg border border-cardBorder rounded-2xl p-6 hover:-translate-y-1 transition-all duration-300 hover:shadow-lg hover:shadow-accent/5">
                            <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4 mb-4">
                                <div>
                                    <h3 class="text-xl font-bold text-textMain group-hover:text-accent transition-colors">${cert.title}</h3>
                                    <p class="text-textMuted font-medium mt-1 flex items-center gap-2">
                                        <i class="fas fa-building text-accent/70"></i> ${cert.issuer}
                                    </p>
                                </div>
                                <span class="text-accent text-xs font-bold px-3 py-1.5 bg-accent/10 rounded-full inline-block self-start whitespace-nowrap">
                                    <i class="far fa-calendar-alt mr-1"></i> ${cert.date}
                                </span>
                            </div>
                            <p class="text-textMuted text-sm leading-relaxed mb-4">${cert.description}</p>
                            
                            <div class="pt-4 border-t border-cardBorder">
                                <a href="${cert.link}" target="_blank" class="inline-flex items-center gap-2 text-accent text-sm font-bold hover:text-white transition-colors">
                                    <i class="fas fa-external-link-alt"></i> View Certificate
                                </a>
                            </div>
                        </div>
                    </div>
                `).join('');

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('opacity-100', 'translate-x-0');
                            entry.target.classList.remove('opacity-0', '-translate-x-8');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.15 });

                timeline.querySelectorAll('.animate-on-scroll').forEach((el) => {
                    el.classList.add('opacity-0', '-translate-x-8', 'transition-all', 'duration-700', 'ease-out');
                    observer.observe(el);
                });
            }

            render(certificationsData); // fallback first

            if (supabaseClient) {
                try {
                    const { data, error } = await supabaseClient
                        .from('certifications')
                        .select('title,issuer,date,description,icon,link,created_at')
                        .order('created_at', { ascending: true });

                    if (!error && Array.isArray(data)) {
                        certificationsData = data;
                        render(certificationsData);
                    }
                } catch (error) {
                    console.warn('Supabase load failed, keeping fallback.', error);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', loadAndRenderCertifications);

        // Mobile Menu Toggle
        const btn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileLinks = document.querySelectorAll('.mobile-link');

        if (btn && mobileMenu) {
            btn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });

            mobileLinks.forEach(link => {
                link.addEventListener('click', () => {
                    mobileMenu.classList.add('hidden');
                });
            });
        }
    </script>
</body>
