    <!-- Projects Section -->
    <section id="projects" class="pt-32 pb-16 min-h-screen bg-base">

    <!-- Footer -->
    <footer class="bg-baseAlt border-t border-cardBorder py-8">

    <!-- Right-side Social Pull-out Menu -->
    <div id="social-menu-container"
        class="fixed right-0 top-[35%] md:top-1/2 -translate-y-1/2 z-[90] flex items-center transition-transform duration-500 translate-x-full">
        <!-- Toggle Button (visible when closed) -->
        <button id="social-menu-toggle"
            class="absolute -left-10 w-10 h-14 bg-baseAlt/60 backdrop-blur-md border border-r-0 border-cardBorder rounded-l-full flex items-center justify-center text-textMuted hover:text-accent shadow-[-5px_0_20px_rgba(0,0,0,0.3)] transition-all focus:outline-none">
            <i class="fas fa-share-alt text-lg pr-1"></i>
        </button>

        <!-- Menu Content -->
        <div
            class="bg-baseAlt/70 backdrop-blur-lg border border-r-0 border-cardBorder rounded-l-full py-6 pl-4 pr-3 shadow-[-10px_0_30px_rgba(0,0,0,0.4)] relative">
            <div class="grid grid-cols-2 grid-rows-3 gap-2 md:gap-3 place-items-center">
                <!-- GitHub -->
                <a href="https://github.com/priyaudayakumar8921" target="_blank"
                    class="col-start-2 row-start-1 w-8 h-8 md:w-10 md:h-10 rounded-full bg-white border border-white flex items-center justify-center text-black hover:bg-gray-200 hover:scale-110 transition-all duration-300 shadow-[0_0_15px_rgba(255,255,255,0.4)]"
                    title="GitHub">
                    <i class="fab fa-github text-base md:text-lg"></i>
                </a>

                <!-- WhatsApp -->
                <a href="https://wa.me/919074242334" target="_blank"
                    class="col-start-1 row-start-2 -mr-2 w-8 h-8 md:w-10 md:h-10 rounded-full bg-[#25D366]/80 border border-[#25D366] flex items-center justify-center text-white hover:bg-[#25D366] hover:scale-110 transition-all duration-300 relative z-10 shadow-[0_0_10px_rgba(37,211,102,0.3)]"
                    title="WhatsApp">
                    <i class="fab fa-whatsapp text-lg md:text-xl"></i>
                </a>

                <!-- Close button in the middle -->
                <button id="social-menu-close"
                    class="col-start-2 row-start-2 w-8 h-8 md:w-10 md:h-10 rounded-full bg-red-500/80 border border-red-500 flex items-center justify-center text-white hover:bg-red-500 hover:scale-110 transition-all duration-300 focus:outline-none shadow-[0_0_10px_rgba(239,68,68,0.3)]"
                    title="Close">
                    <i class="fas fa-times text-base md:text-lg"></i>
                </button>

                <!-- LinkedIn -->
                <a href="https://www.linkedin.com/in/priya-udayakumar-7453762b5?utm_source=share_via&utm_content=profile&utm_medium=member_android"

                    class="col-start-2 row-start-3 w-8 h-8 md:w-10 md:h-10 rounded-full bg-[#0077b5]/80 border border-[#0077b5] flex items-center justify-center text-white hover:bg-[#0077b5] hover:scale-110 transition-all duration-300 shadow-[0_0_10px_rgba(0,119,181,0.3)]"
                    title="LinkedIn">

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const socialMenuContainer = document.getElementById('social-menu-container');
            const socialMenuToggle = document.getElementById('social-menu-toggle');
            const socialMenuClose = document.getElementById('social-menu-close');

            if (socialMenuToggle && socialMenuClose) {
                socialMenuToggle.addEventListener('click', () => {
                    socialMenuContainer.classList.remove('translate-x-full');
                    socialMenuToggle.classList.add('opacity-0', 'pointer-events-none');
                });

                socialMenuClose.addEventListener('click', () => {
                    socialMenuContainer.classList.add('translate-x-full');
                    socialMenuToggle.classList.remove('opacity-0', 'pointer-events-none');
                });
            }
        });
    </script>

    <!-- Supabase SDK & Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = atob('aHR0cHM6Ly9peXFtcXpoanhxbXN3dWZsbXNlei5zdXBhYmFzZS5jbw==');
        const SUPABASE_ANON_KEY = atob('ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW1sNWNXMXhlbWhxZUhGdGMzZDFabXh0YzJWNklpd2ljbTlzWlNJNkltRnViMjRpTENKcFlYUWlPakUzT0RJek9UWXpPRElzSW1WNGNDSTZNakE1TnprM01qTTRNbjAuMi1YeDN3SDBacXBJTkJnZ2wyTGNOSXJrVWxCNElZM1ZUeHhrNzFocUJsUQ==');

        let supabaseClient = null;
        try {
            if (window.supabase && typeof window.supabase.createClient === 'function') {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch (error) {
            console.warn('Supabase initialization failed:', error);
        }

        const fallbackProjects = [];

        async function loadAndRenderProjects() {
            let projectsData = fallbackProjects;

            function render(data) {
                const grid = document.getElementById('projects-grid');
                grid.innerHTML = data.map((project) => `
                    <div class="bg-cardBg rounded-2xl overflow-hidden border border-cardBorder group hover:-translate-y-1 transition-all duration-300 animate-on-scroll flex flex-col h-full">
                        <div class="h-48 overflow-hidden bg-baseAlt relative">
                            <img src="${project.image}" alt="${project.title}" loading="lazy" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 opacity-80 group-hover:opacity-100">
                        </div>
                        <div class="p-6 flex flex-col h-[calc(100%-12rem)]">
                            <h3 class="text-xl font-bold text-textMain mb-2 group-hover:text-accent">${project.title}</h3>
                            <p class="text-textMuted text-sm mb-4">${project.description}</p>
                            <div class="flex flex-wrap gap-2 mb-4">${(project.tags || []).map((tag) => `<span class="text-accent text-xs font-semibold px-2 py-1 bg-accent/10 rounded">${tag}</span>`).join('')}</div>
                            
                            <div class="mt-auto flex items-center gap-3 pt-4 border-t border-cardBorder/50">
                                ${project.github_link ? `<a href="${project.github_link}" target="_blank" class="flex items-center justify-center bg-baseAlt hover:bg-accent/20 text-textMain hover:text-accent rounded-full p-2 transition-colors"><i class="fab fa-github text-xl"></i></a>` : ''}
                                ${project.demo_link ? `<a href="${project.demo_link}" target="_blank" class="flex-1 text-center bg-accent text-black font-bold py-2 rounded-xl hover:bg-accentHover transition-colors text-sm">Live Demo <i class="fas fa-external-link-alt ml-1"></i></a>` : ''}
                                ${!project.github_link && !project.demo_link ? `<a href="#" class="inline-flex items-center gap-2 text-accent text-sm font-bold hover:text-white transition-colors"><i class="fab fa-github text-lg"></i> View on GitHub</a>` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('opacity-100', 'translate-y-0');
                            entry.target.classList.remove('opacity-0', 'translate-y-8');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.15 });

                grid.querySelectorAll('.animate-on-scroll').forEach((el) => {
                    el.classList.add('opacity-0', 'translate-y-8', 'transition-all', 'duration-700', 'ease-out');
                    observer.observe(el);
                });
            }

            // Initial render immediately
            render(projectsData);

            if (supabaseClient) {
                try {
                    const { data, error } = await supabaseClient
                        .from('projects')
                        .select('title,description,tags,image,github_link,demo_link,created_at')
                        .order('created_at', { ascending: true });

                    if (!error && Array.isArray(data)) {
                        projectsData = data.map((p) => ({
                            ...p,
                            tags: Array.isArray(p.tags) ? p.tags : (typeof p.tags === 'string' ? p.tags.split(',').map(t => t.trim()) : [])
                        }));
                        render(projectsData); // Re-render with fetched data
                    }
                } catch (error) {
                    console.warn('Supabase load failed, keeping fallback.', error);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', loadAndRenderProjects);

        // Mobile Menu Toggle
        const btn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileLinks = document.querySelectorAll('.mobile-link');

        if (btn && mobileMenu) {
            btn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });

            mobileLinks.forEach(link => {
                link.addEventListener('click', () => {
                    mobileMenu.classList.add('hidden');
                });
            });
        }
    </script>
</body>

</html>
